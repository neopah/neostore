<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeoStore Premium</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      overflow-x: hidden;
      padding: 0;
      margin: 0;
    }

    header {
      padding: 40px 20px;
      width: 100%;
      text-align: center;
      animation: fadeInUp 0.8s ease forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    header h1 {
      font-size: 48px;
      color: #00ffe1;
      margin: 0;
      letter-spacing: 4px;
      font-weight: 900;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      padding: 30px 20px;
      margin: 40px auto;
      max-width: 1000px;
    }

    @media (max-width: 768px) {
      .card-container {
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        max-width: 100%;
      }
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      box-shadow: 0 0 35px rgba(0, 255, 200, 0.3);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      padding: 20px;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
      transition: transform 0.3s ease;
    }

    .card:hover img {
      transform: scale(1.05);
    }

    .card h3 {
      color: #fff;
      margin-top: 15px;
      font-size: 20px;
    }

    .card p {
      color: #00ffcc;
      font-weight: 500;
      font-size: 18px;
      margin-top: auto;
    }

    .input-group {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .input-group input, .input-group select {
      padding: 12px;
      font-size: 16px;
      width: 250px;
      max-width: 90%; /* Mengatur lebar input agar responsif */
      border-radius: 10px;
      border: 1px solid #00ffcc;
      background-color: rgba(0, 0, 0, 0.2);
      color: white;
    }

    .input-group button {
      padding: 12px;
      font-size: 20px;
      background-color: #00ffcc;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .input-group button:hover {
      background-color: #00ccaa;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      background: #00ffcc;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00ccaa;
      transform: scale(1.05);
    }

    #totalBox {
      margin-top: 10px;
      font-size: 20px;
      font-weight: bold;
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
    }

    #summaryBox {
      display: none;
      margin-top: 15px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 15px;
      font-size: 14px;
    }

    #idPembayaranBox {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
    }

    /* Agar tombol Order dan Cek Status bisa bekerja tanpa gangguan */
    button:focus {
      outline: none;
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Scrollable Container untuk Formulir di Mobile */
    .scrollable-form {
      max-height: 70vh;
      overflow-y: auto;
    }

  </style>
</head>
<body>

<header>
  <h1>NEOSTORE⚡</h1>
</header>

<section class="card-container">
  <!-- Produk 1 -->
  <div class="card" onclick="selectProduct('Batu Evo', 500)">
    <img src="img/batu-evo.jpg" alt="Batu Evo">
    <h3>Batu Evo</h3>
    <p>Rp500</p>
  </div>

  <!-- Produk 2 -->
  <div class="card" onclick="selectProduct('Secret Tumbal', 1000)">
    <img src="img/secret-tumbal.jpg" alt="Secret Tumbal">
    <h3>Secret Tumbal</h3>
    <p>Rp1.000</p>
  </div>

  <!-- Produk 3 -->
  <div class="card" onclick="selectProduct('Maja Biru', 3000)">
    <img src="img/maja-biru.jpg" alt="Maja Biru">
    <h3>Maja Biru</h3>
    <p>Rp3.000</p>
  </div>

  <!-- Produk 4 -->
  <div class="card" onclick="selectProduct('Maja Kuning', 4000)">
    <img src="img/maja-kuning.jpg" alt="Maja Kuning">
    <h3>Maja Kuning</h3>
    <p>Rp4.000</p>
  </div>

  <!-- Produk 5 -->
  <div class="card" onclick="selectProduct('Megalodon', 10000)">
    <img src="img/megalodon.jpg" alt="Megalodon">
    <h3>Megalodon</h3>
    <p>Rp10.000</p>
  </div>
</section>

<section class="card scrollable-form">
  <form id="orderForm">
    <div class="input-group">
      <input type="text" id="username" placeholder="Username Fishit" required>
    </div>
    <div class="input-group">
      <select id="metode" required>
        <option value="">Metode Pembayaran</option>
        <option>DANA</option>
        <option>OVO</option>
        <option>GOPAY</option>
      </select>
    </div>
    <div class="input-group">
      <input type="number" id="jumlah" placeholder="Jumlah Pembelian" min="1" value="1" required>
    </div>

    <div id="totalBox">Total: Rp0</div>
    <div id="summaryBox"></div>
    
    <!-- ID Pembayaran Ditampilkan -->
    <div id="idPembayaranBox">ID Pembayaran: -</div>

    <!-- Tombol Order yang hanya memproses dan memberikan pilihan -->
    <button type="button" onclick="submitOrder()">ORDER SEKARANG</button>
    <hr style="margin: 20px 0; border: 1px solid rgba(255, 255, 255, 0.1)">
    <h3>Cek Status Pembayaran</h3>
    <input type="text" id="cekId" placeholder="Masukkan ID Pembayaran">
    <button type="button" onclick="cekStatus()">Cek Status</button>
    <div id="hasilCek"></div>
  </form>
</section>

<script>
// Data Order
let dataOrder = {};

// Fungsi untuk memilih produk dan menyimpan informasi transaksi
function selectProduct(produk, harga) {
  dataOrder.id = generateUniqueId(); // Menambahkan ID transaksi unik
  dataOrder.produk = produk;
  dataOrder.harga = harga;
  dataOrder.username = document.getElementById("username").value || "Anonymous";
  dataOrder.jumlah = parseInt(document.getElementById("jumlah").value) || 1;
  updateTotalPrice();
}

// Fungsi untuk menghitung total harga
function updateTotalPrice() {
  let jumlah = parseInt(document.getElementById("jumlah").value) || 1;
  let harga = dataOrder.harga || 0;
  let total = jumlah * harga;
  dataOrder.total = total; // Menyimpan total pembayaran ke dataOrder
  document.getElementById("totalBox").innerText = `Total: Rp${total.toLocaleString("id-ID")}`;
  
  // Update summary
  document.getElementById("summaryBox").style.display = "block";
  document.getElementById("summaryBox").innerHTML = 
    `Ringkasan Order:<br>Produk: ${dataOrder.produk}<br>Harga: Rp${harga.toLocaleString("id-ID")}<br>Jumlah: ${jumlah}<br>Total: Rp${total.toLocaleString("id-ID")}<br>Status: <span style="color:orange;">PENDING</span><br><br>`;

  // Menampilkan ID Pembayaran
  document.getElementById("idPembayaranBox").innerText = `ID Pembayaran: ${dataOrder.id}`;
}

// Fungsi untuk menggenerate ID unik untuk transaksi
function generateUniqueId() {
  return 'ID-' + Math.floor(Math.random() * 1000000); // Contoh ID unik
}

// Fungsi untuk submit order
function submitOrder() {
  let metode = document.getElementById("metode").value;
  
  if (metode === "") {
    alert("Pilih metode pembayaran terlebih dahulu!");
    return;
  }

  // Mengonfirmasi pemilihan metode pembayaran
  let pesan = `Pesanan Anda telah diproses dengan metode pembayaran ${metode}.`;

  alert(pesan);
  
  // Kirim ke WhatsApp
  kirimWA(metode);
}

// Kirim pesan WhatsApp
function kirimWA(metode) {
  let pesan = 
    `Halo Admin, saya mau beli:\n\n` +
    `ID Pembayaran: ${dataOrder.id}\n` +
    `Username: ${dataOrder.username}\n` +
    `Jumlah pembelian: ${dataOrder.jumlah}\n` +
    `Produk: ${dataOrder.produk}\n` +
    `Total pembayaran: Rp${dataOrder.total.toLocaleString("id-ID")}\n` +
    `Metode Pembayaran: ${metode}\n\n` +
    `Terimakasih sudah order di NEOSTORE ⚡`;

  window.open("https://wa.me/6281328941033?text=" + encodeURIComponent(pesan), "_blank");
}

// Cek Status Pembayaran
function cekStatus() {
  let id = document.getElementById("cekId").value.trim();
  let status = localStorage.getItem(id);
  let hasil = document.getElementById("hasilCek");

  if (status) {
    let warna = status === "BERHASIL" ? "lime" : status === "PENDING" ? "orange" : "red";
    hasil.innerHTML = `Status ID ${id}: <span style="color:${warna};">${status}</span>`;
  } else {
    hasil.innerHTML = `ID ${id} tidak ditemukan!`;
  }
}
</script>

</body>
</html>
