<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoStore Premium</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

header {
  padding: 40px 20px;
}

header h1 {
  font-size: 42px;
  color: #00ffcc;
  margin: 0;
  letter-spacing: 2px;
  text-shadow: 0 0 15px #00ffcc;
}

.card-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(15px);
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0, 255, 200, 0.3);
  text-align: center;
}

.card img {
  width: 100%;
  max-height: 200px;
  object-fit: cover;
  border-radius: 10px;
}

.card h3 {
  color: #fff;
  margin-top: 10px;
}

.card p {
  color: #00ffcc;
  font-weight: bold;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #00ffcc;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #00ccaa;
  transform: scale(1.05);
}

#totalBox {
  margin-top: 10px;
  font-size: 20px;
  font-weight: bold;
  color: #00ffcc;
  text-shadow: 0 0 15px #00ffcc;
}

#summaryBox {
  display: none;
  margin-top: 15px;
  padding: 15px;
  background: rgba(0, 0, 0, 0.4);
  border-radius: 15px;
  font-size: 14px;
}

#hasilCek {
  margin-top: 10px;
  font-weight: bold;
}

hr {
  margin: 20px 0;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

</style>
</head>
<body>

<header>
  <h1>NEOSTORE⚡</h1>
  <p>Top Up Fishit Premium ⚡</p>
</header>

<section class="card-container">
  <!-- Produk 1 -->
  <div class="card">
    <img src="img/batu-evo.jpg" alt="Batu Evo">
    <h3>Batu Evo</h3>
    <p>Rp500</p>
    <button onclick="order('Batu Evo - Rp500', 500)">Order Sekarang</button>
  </div>

  <!-- Produk 2 -->
  <div class="card">
    <img src="img/secret-tumbal.jpg" alt="Secret Tumbal">
    <h3>Secret Tumbal</h3>
    <p>Rp1.000</p>
    <button onclick="order('Secret Tumbal - Rp1.000', 1000)">Order Sekarang</button>
  </div>

  <!-- Produk 3 -->
  <div class="card">
    <img src="img/maja-biru.jpg" alt="Maja Biru">
    <h3>Maja Biru</h3>
    <p>Rp3.000</p>
    <button onclick="order('Maja Biru - Rp3.000', 3000)">Order Sekarang</button>
  </div>

  <!-- Produk 4 -->
  <div class="card">
    <img src="img/maja-kuning.jpg" alt="Maja Kuning">
    <h3>Maja Kuning</h3>
    <p>Rp4.000</p>
    <button onclick="order('Maja Kuning - Rp4.000', 4000)">Order Sekarang</button>
  </div>

  <!-- Produk 5 -->
  <div class="card">
    <img src="img/megalodon.jpg" alt="Megalodon">
    <h3>Megalodon</h3>
    <p>Rp10.000</p>
    <button onclick="order('Megalodon - Rp10.000', 10000)">Order Sekarang</button>
  </div>
</section>

<!-- Form untuk Order -->
<section class="card">
  <form id="orderForm">
    <input type="text" id="username" placeholder="Username Fishit" required>

    <select id="metode" required>
      <option value="">Metode Pembayaran</option>
      <option>DANA</option>
      <option>OVO</option>
      <option>GOPAY</option>
      <option>QRIS</option>
    </select>

    <div id="totalBox">Total: Rp0</div>
    <div id="summaryBox"></div>

    <button type="submit">ORDER SEKARANG</button>
    <hr>
    <h3>Cek Status Pembayaran</h3>
    <input type="text" id="cekId" placeholder="Masukkan ID Pembayaran">
    <button type="button" onclick="cekStatus()">Cek Status</button>
    <div id="hasilCek"></div>
  </form>
</section>

<!-- QRIS POPUP -->
<div id="qrisPopup">
  <div class="qrisContent">
    <h3 style="color:#00ffcc;">Scan QRIS</h3>
    <img src="img/qris.jpg" style="width:220px;border-radius:12px;">
    <br><br>
    <button onclick="sudahBayar()">Saya Sudah Bayar</button>
    <br><br>
    <button onclick="tutupQR()" style="background:#444;">Tutup</button>
  </div>
</div>

<script>
// Produk
let hargaMap = {
  "Batu Evo - Rp500": 500,
  "Secret Tumbal - Rp1.000": 1000,
  "Maja Biru - Rp3.000": 3000,
  "Maja Kuning - Rp4.000": 4000,
  "Megalodon - Rp10.000": 10000
};

let dataOrder = {};

function updateTotal() {
  let h = hargaMap[dataOrder.produk] || 0;
  let total = h * dataOrder.jumlah;
  document.getElementById("totalBox").innerText = "Total: Rp" + total.toLocaleString("id-ID");
}

function order(produk, harga) {
  dataOrder.produk = produk;
  dataOrder.jumlah = 1; // Default quantity 1
  dataOrder.total = harga;

  // Update Total
  updateTotal();

  // Display Summary
  document.getElementById("summaryBox").style.display = "block";
  document.getElementById("summaryBox").innerHTML =
    `Ringkasan Order:<br>
    Produk: ${produk}<br>
    Total: Rp${harga.toLocaleString("id-ID")}<br>
    Status: <span style="color:orange;">PENDING</span><br><br>
    <button onclick="ubahStatus('BERHASIL')">Simulasi Berhasil</button>
    <button onclick="ubahStatus('GAGAL')">Simulasi Gagal</button>`;

  // Open QRIS or WA
  if (document.getElementById("metode").value === "QRIS") {
    document.getElementById("qrisPopup").style.display = "flex";
  } else {
    kirimWA("PENDING");
  }
}

// Function to update status (Simulasi)
function ubahStatus(statusBaru) {
  let warna = statusBaru === "BERHASIL" ? "lime" : "red";
  document.getElementById("summaryBox").innerHTML +=
    `<p>Status Sekarang: <b style="color:${warna};">${statusBaru}</b></p>`;
  kirimWA(statusBaru);
}

function kirimWA(status) {
  let pesan =
    `Halo Admin, saya mau beli:

ID Pembayaran: ${dataOrder.id}
Username: ${dataOrder.username}
Jumlah pembelian: ${dataOrder.jumlah}
Produk: ${dataOrder.produk}
Total pembayaran: Rp${dataOrder.total.toLocaleString("id-ID")}
Status: ${status}

Terimakasih sudah order di NEOSTORE ⚡`;

  window.open("https://wa.me/6281328941033?text=" + encodeURIComponent(pesan), "_blank");
}

// Function for QRIS Payment Success
function sudahBayar() {
  localStorage.setItem(dataOrder.id, "BERHASIL");
  document.getElementById("summaryBox").innerHTML +=
    `<p>Status Sekarang: <b style="color:lime;">BERHASIL</b></p>`;
  kirimWA("BERHASIL");
  tutupQR();
}

function tutupQR() {
  document.getElementById("qrisPopup").style.display = "none";
}

// Cek Status Pembayaran
function cekStatus() {
  let id = document.getElementById("cekId").value.trim();
  let status = localStorage.getItem(id);
  let hasil = document.getElementById("hasilCek");

  if (status) {
    let warna = status === "BERHASIL" ? "lime" : status === "PENDING" ? "orange" : "red";
    hasil.innerHTML = `Status ID ${id}: <span style="color:${warna};">${status}</span>`;
  } else {
    hasil.innerHTML = `ID ${id} tidak ditemukan!`;
  }
}
</script>

</body>
</html>
